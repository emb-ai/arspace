<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no"
  />
  <title>ARspace - Augmented Reality Posters</title>
  <link rel="stylesheet" href="./css/styles.css" />

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
    }
  }
  </script>
</head>
<body>
  <main class="shell">
    <section class="stage" aria-live="polite">
      <div id="ar-container"></div>

      <div id="statusOverlay" class="status show">
        <div class="status-content">
          <div class="loader" id="loader"></div>
          <p id="statusText">Downloading AR engine...</p>
          <button class="tap-start" id="tapStart" style="display:none;">START</button>
          <div class="loading-progress" id="loadingProgress">
            <h3>Loading Assets</h3>
            <div id="loadingItems">
              <div class="loading-item loading">
                <span class="loading-icon loading">◌</span>
                <span class="loading-label">AR Engine Code</span>
                <span class="loading-size">~2.6 MB</span>
              </div>
              <div class="loading-item pending">
                <span class="loading-icon pending">○</span>
                <span class="loading-label">Camera Access</span>
              </div>
              <div class="loading-item pending">
                <span class="loading-icon pending">○</span>
                <span class="loading-label">AR Target Data</span>
                <span class="loading-size">2.0 MB</span>
              </div>
              <div class="loading-item pending">
                <span class="loading-icon pending">○</span>
                <span class="loading-label">Videos (4)</span>
                <span class="loading-size">6.5 MB</span>
              </div>
              <div class="loading-item pending">
                <span class="loading-icon pending">○</span>
                <span class="loading-label">Reference Images</span>
                <span class="loading-size">252 KB</span>
              </div>
            </div>
            <div class="loading-total">
              <span class="loading-total-label">Progress</span>
              <span class="loading-total-value" id="loadingPercent">0/5 (0%)</span>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
  
  <script>
    window.onerror = function(msg, url, line, col, error) {
      var statusText = document.getElementById('statusText');
      var loader = document.getElementById('loader');
      if (statusText) {
        statusText.innerHTML = '<strong>Error:</strong> ' + (msg || 'Failed to load. Try updating your browser.');
        if (loader) loader.style.display = 'none';
      }
      return false;
    };
    
    if (!('importmap' in HTMLScriptElement.prototype || document.querySelector('script[type="importmap"]'))) {
      var statusText = document.getElementById('statusText');
      if (statusText) {
        statusText.innerHTML = '<strong>Browser not supported.</strong><br>Please use Chrome 89+, Safari 16.4+, or Firefox 108+.';
        document.getElementById('loader').style.display = 'none';
      }
    }
  </script>
  <script type="module" src="./js/app.js" onerror="document.getElementById('statusText').innerHTML='Failed to load AR module.'"></script>
</body>
</html>
